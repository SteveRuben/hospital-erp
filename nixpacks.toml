# ============================================================================
#   Nixpacks build configuration — Hospital ERP (Railway / generic PaaS)
# ============================================================================
#
#   Build pipeline:
#     1. setup   → Node.js 20 toolchain
#     2. install → npm install (incl. dev deps for tsc/vite) +
#                  Rollup native binary fix for optionalDependencies bug
#                  (see https://github.com/npm/cli/issues/4828)
#     3. build   → vite (frontend) → prisma generate → tsc (backend)
#                  Output: packages/frontend/dist + packages/backend/dist
#     4. start   → single Node process: Express serves API + static SPA
#
#   Required production env vars (the app refuses to boot without these):
#     - NODE_ENV=production
#     - JWT_SECRET                (64 hex chars — middleware/auth.ts:10)
#     - PHI_ENCRYPTION_KEY        (64 hex chars — services/encryption.ts)
#       HIPAA §164.312(a)(2)(iv): PHI at rest must be encrypted; the server
#       now exits at startup if this is missing in production (was a silent
#       warning before).
#     - DATABASE_URL              (Postgres connection string)
#     - FRONTEND_URL              (CORS allowlist)
#
#   Recommended:
#     - REDIS_URL                 (distributed session blacklist for multi-replica)
#
#   Schema bootstrap (transitional): two layers run before the app
#   process to converge on prisma migrate deploy as the source of truth
#   without breaking the existing init.ts-bootstrapped prod DBs.
#
#     1. migrate-bootstrap.js — detects whether the DB was already
#        shaped by init.ts (heuristic: `patients` table exists). If yes
#        AND _prisma_migrations is empty, marks every existing migration
#        directory as applied so `prisma migrate deploy` does not try to
#        re-apply the baseline CREATE TABLE statements. Idempotent.
#
#     2. prisma migrate deploy — applies any migration not yet recorded
#        in _prisma_migrations. After the bootstrap step on existing
#        DBs this is effectively a no-op on first run; it picks up
#        every future migration normally.
#
#     3. init.ts still runs from inside the Node process for the seed
#        data (users, habilitations, menu config, reference lists,
#        starter concepts). Its idempotent ALTERs remain as a belt-and-
#        suspenders safety net until init.ts is split into a pure seed
#        script (see prisma/migrations/README.md "Phase 2").
#
#   See RAILWAY.md for the full deploy walkthrough.
# ============================================================================

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Rollup ships native binaries via optionalDependencies which npm sometimes
# skips on Linux x64 — the `--no-save` install forces the binary in without
# polluting package-lock.json.
cmds = ["npm install --include=dev && npm install @rollup/rollup-linux-x64-gnu --no-save"]

[phases.build]
cmds = ["npm run build"]

[start]
# Two-step boot: bootstrap _prisma_migrations from existing schema state,
# apply any pending Prisma migrations, then hand off to the app process.
# Each `&&` ensures we abort on failure rather than starting the app
# against a half-migrated schema.
cmd = "node packages/backend/dist/scripts/migrate-bootstrap.js && cd packages/backend && npx prisma migrate deploy && cd ../.. && node packages/backend/dist/index.js"
